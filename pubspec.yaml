name: feed_fusion
description: "Resilient Multi-Source Feed - LinkedIn-like feed system"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.7.2

  # Networking
  dio: ^5.7.0

  # Connectivity
  connectivity_plus: ^6.1.4

  # Local Storage
  shared_preferences: ^2.5.3

  # UI Enhancements
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Fonts (no download needed — fetched automatically)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
